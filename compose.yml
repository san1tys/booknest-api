services:
  web:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      BOOKNEST_ENV_ID: ${BOOKNEST_ENV_ID}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
        required: false
    command:
      - /bin/sh
      - -c
      - >
        if [ "$BOOKNEST_ENV_ID" = "prod" ]; then
          python manage.py migrate &&
          gunicorn settings.wsgi:application --bind 0.0.0.0:8000;
        else
          python manage.py runserver 0.0.0.0:8000;
        fi

  db:
    image: postgres:16
    profiles: ["prod"]
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
