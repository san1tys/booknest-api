[tool.black]
line-length = 88
target-version = ["py312"]
exclude = '''
/(
  \.venv
| venv
| migrations
| __pycache__
| db\.sqlite3
| media
| static
)/
'''

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = ["venv", ".venv", "migrations", "__pycache__", "db.sqlite3", "media", "static"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"settings/**/*.py" = ["F403", "F405"]
"**/migrations/*.py" = ["E501", "F401"]